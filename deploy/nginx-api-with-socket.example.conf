# Example: reverse proxy for Express API + Socket.IO on the same Node process.
# Copy the `location` blocks into the server { } for your API hostname
# (e.g. api.port.porttivo.com). Replace UPSTREAM with your Node listen address.
#
# Verify Engine.IO polling (expect `0{...` payload, not 404/HTML):
#   curl -sS "https://YOUR_HOST/socket.io/?EIO=4&transport=polling"
#
# If your proxy only forwards paths under /api/, use Option B below instead of
# exposing /socket.io at the host root.

upstream porttivo_node {
    server 127.0.0.1:3000;
    keepalive 32;
}

# --- REST API ---
location /api/ {
    proxy_pass http://porttivo_node/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 60s;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
}

# --- Socket.IO (default path /socket.io) — same upstream as /api ---
location /socket.io/ {
    proxy_pass http://porttivo_node/socket.io/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
    proxy_buffering off;
}

#
# --- Option B: Socket.IO under /api (only if you cannot expose /socket.io) ---
#
# 1. Set env on the Node process: SOCKET_IO_PATH=/api/socket.io
# 2. Rebuild Flutter with: --dart-define=SOCKET_IO_PATH=/api/socket.io
# 3. Optionally set socketBaseUrlOverride if sockets run on another host.
# 4. Use this location instead of the /socket.io/ block above (remove duplicate path).
#
# location /api/socket.io/ {
#     proxy_pass http://porttivo_node/api/socket.io/;
#     proxy_http_version 1.1;
#     proxy_set_header Host $host;
#     proxy_set_header X-Real-IP $remote_addr;
#     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#     proxy_set_header X-Forwarded-Proto $scheme;
#     proxy_set_header Upgrade $http_upgrade;
#     proxy_set_header Connection "upgrade";
#     proxy_read_timeout 86400s;
#     proxy_send_timeout 86400s;
#     proxy_buffering off;
# }
#
# Test:
#   curl -sS "https://YOUR_HOST/api/socket.io/?EIO=4&transport=polling"
